<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Holiday Calendar 2026</title>
    <style>
        :root {
            --primary-red: #e74c3c;
            --bg-gray: #f4f7f6;
            --border-color: #ddd;
            --text-dark: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: var(--bg-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calendar-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 15px;
            box-sizing: border-box;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-nav h2 {
            margin: 0;
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            color: var(--text-dark);
        }

        .nav-btn {
            background-color: #fff;
            border: 1px solid var(--border-color);
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .nav-btn:hover { background-color: #eee; }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .calendar-table th, .calendar-table td {
            border: 1px solid var(--border-color);
            text-align: center;
            vertical-align: middle;
            position: relative;
            padding: 0;
            height: 0;
            padding-bottom: 14%; 
        }

        .cell-content {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.8rem, 3vw, 1rem);
        }

        .calendar-table th {
            background-color: #f8f9fa;
            height: auto;
            padding: 8px 0;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            color: #777;
        }

        /* Holiday Circle Style */
        .day-off span {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            border: 2px solid var(--primary-red);
            color: var(--primary-red);
            font-weight: bold;
            box-sizing: border-box;
        }

        .today-highlight { background-color: #fff3cd; }
        .outside-range { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="calendar-container">
    <div class="header-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">&#10094;</button>
        <h2 id="monthTitle">April 2026</h2>
        <button class="nav-btn" onclick="changeMonth(1)">&#10095;</button>
    </div>
    <table class="calendar-table" id="calendarTable"></table>
</div>

<script>
    const today = new Date();
    let currentViewDate = new Date(2026, 3, 1);

    function renderCalendar() {
        const table = document.getElementById('calendarTable');
        const title = document.getElementById('monthTitle');
        
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        const monthNames = ["January", "February", "March", "April", "May", "June",
                            "July", "August", "September", "October", "November", "December"];
        
        title.innerText = `${monthNames[month]} ${year}`;

        // Monday start logic: (0=Sun, 1=Mon...6=Sat) -> we want Mon=0, Sun=6
        let firstDay = new Date(year, month, 1).getDay();
        let adjFirstDay = (firstDay === 0) ? 6 : firstDay - 1; 

        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        // Header labels starting from Monday
        let html = '<thead><tr><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th></tr></thead><tbody>';
        
        let date = 1;
        let satCount = 0;
        
        for (let i = 0; i < 6; i++) {
            html += '<tr>';
            for (let j = 0; j < 7; j++) {
                if (i === 0 && j < adjFirstDay) {
                    html += '<td class="outside-range"></td>';
                } else if (date > daysInMonth) {
                    html += '<td class="outside-range"></td>';
                } else {
                    let isHoliday = false;
                    let isToday = (date === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                    
                    // Logic: Sat is index 5, Sun is index 6 (since we start Mon at 0)
                    if (j === 5) { // Saturday
                        satCount++;
                        if (satCount === 2 || satCount === 4) isHoliday = true;
                    } else if (j === 6) { // Sunday
                        isHoliday = true;
                    }

                    let cellClass = isHoliday ? 'day-off' : 'work-day';
                    if (isToday) cellClass += ' today-highlight';

                    let content = isHoliday ? `<span>${date}</span>` : date;
                    html += `<td class="${cellClass}"><div class="cell-content">${content}</div></td>`;
                    date++;
                }
            }
            html += '</tr>';
            if (date > daysInMonth) break;
        }
        html += '</tbody>';
        table.innerHTML = html;
    }

    function changeMonth(offset) {
        currentViewDate.setMonth(currentViewDate.getMonth() + offset);
        renderCalendar();
    }

    renderCalendar();
</script>

</body>
</html>
