<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal Election 2082 - Live Results</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8001c;
    --dark-red: #a00012;
    --gold: #f5c200;
    --dark: #0a0a0a;
    --card-bg: #111418;
    --card-border: #1e2530;
    --text: #f0f0f0;
    --muted: #8a9ab5;
    --green: #00e676;
    --blue: #1565ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
  }

  .screen { display: flex; flex-direction: column; height: 100vh; }

  /* ════════ TOP BAR ════════ */
  .topbar {
    background: linear-gradient(90deg, #0a0a0a 0%, #1a0005 50%, #0a0a0a 100%);
    border-bottom: 3px solid var(--red);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 66px; flex-shrink: 0;
    position: relative; overflow: hidden;
  }
  .topbar::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.012) 80px, rgba(255,255,255,0.012) 81px);
    pointer-events: none;
  }
  .brand { display: flex; align-items: center; gap: 12px; z-index: 1; }
  .flag-icon {
    font-size: 34px;
    filter: drop-shadow(0 0 14px rgba(255,50,50,0.6));
    animation: flagPulse 3s ease-in-out infinite;
  }
  @keyframes flagPulse {
    0%,100% { filter: drop-shadow(0 0 12px rgba(255,50,50,0.5)); }
    50%      { filter: drop-shadow(0 0 22px rgba(255,50,50,1)); }
  }
  .brand-text { line-height: 1; }
  .brand-title { font-family: 'Noto Sans Devanagari', 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; color: #fff; }

  .live-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--red); padding: 5px 14px; border-radius: 4px;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; z-index: 1;
    animation: livePulse 1.4s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(232,0,28,0.7); }
    50%      { box-shadow: 0 0 0 8px rgba(232,0,28,0); }
  }
  .live-dot { width: 9px; height: 9px; background: #fff; border-radius: 50%; animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .topbar-stats { display: flex; gap: 22px; z-index: 1; }
  .tstat { text-align: center; }
  .tstat-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); line-height: 1; }
  .tstat-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  /* ════════ SEARCH BAR ════════ */
  .searchbar {
    background: #0d1017; border-bottom: 2px solid var(--card-border);
    padding: 10px 24px; flex-shrink: 0;
    display: flex; align-items: center; gap: 12px;
  }
  .search-icon { color: var(--red); font-size: 18px; }
  .search-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'Rajdhani', sans-serif; font-size: 17px; font-weight: 600;
    color: var(--text); letter-spacing: 0.5px;
  }
  .search-input::placeholder { color: var(--muted); font-weight: 500; }
  .search-count { font-size: 12px; color: var(--muted); letter-spacing: 1px; white-space: nowrap; }
  .search-count span { color: var(--gold); font-weight: 700; }

  /* ════════ SPLIT BODY ════════ */
  .body-split { flex: 1; display: flex; overflow: hidden; }

  /* ── LEFT PANEL ── */
  .left-panel {
    width: 320px; flex-shrink: 0;
    display: flex; flex-direction: column;
    border-right: 2px solid var(--card-border);
    background: #0c0e12; overflow: hidden;
  }
  .panel-header {
    background: linear-gradient(90deg, #12151c, #0c0e12);
    border-bottom: 2px solid var(--card-border);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .panel-header-bar { width: 5px; height: 18px; background: var(--gold); border-radius: 3px; }
  .panel-header-title { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 3px; color: var(--gold); }
  .panel-header-count { margin-left: auto; font-size: 11px; color: var(--muted); letter-spacing: 1px; }

  .autoscroll-wrap {
    flex: 1; overflow: hidden; position: relative;
  }
  .autoscroll-wrap::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
    background: linear-gradient(to top, #0c0e12, transparent);
    pointer-events: none; z-index: 2;
  }
  .autoscroll-track { display: flex; flex-direction: column; will-change: transform; }

  .nv-row {
    display: flex; align-items: center;
    padding: 7px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.038);
    position: relative; overflow: hidden;
    cursor: pointer;
    transition: background 0.15s;
  }
  .nv-row:hover { background: rgba(255,255,255,0.05); }
  .nv-row.is-winner { background: rgba(0,230,118,0.045); }
  .nv-row.is-winner:hover { background: rgba(0,230,118,0.08); }

  .nv-bg-bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: rgba(21,101,255,0.08); pointer-events: none;
  }
  .nv-row.is-winner .nv-bg-bar { background: rgba(0,230,118,0.08); }

  .nv-rank { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: #2a3040; width: 22px; flex-shrink: 0; z-index: 1; line-height: 1; }
  .nv-row.is-winner .nv-rank { color: var(--green); }

  .nv-text { flex: 1; min-width: 0; margin-left: 8px; z-index: 1; }
  .nv-name { font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
  .nv-row.is-winner .nv-name { color: var(--green); }
  .nv-sub { font-size: 10px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .nv-crown { font-size: 10px; margin-left: 3px; }

  .nv-votes { font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: #fff; text-align: right; flex-shrink: 0; min-width: 68px; z-index: 1; line-height: 1; }
  .nv-row.is-winner .nv-votes { color: var(--green); text-shadow: 0 0 8px rgba(0,230,118,0.5); }

  /* ── RIGHT PANEL ── */
  .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Top Competition Slideshow */
  .top-comp-section {
    flex-shrink: 0;
    border-bottom: 2px solid var(--card-border);
    background: #0d0f14;
  }
  .top-comp-header {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 18px 8px;
    border-bottom: 1px solid var(--card-border);
  }
  .top-comp-bar { width: 5px; height: 18px; background: var(--red); border-radius: 3px; }
  .top-comp-title { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 3px; color: var(--red); }
  .top-comp-sub { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-left: auto; }

  .featured-slide-wrap {
    padding: 10px 18px 4px;
    position: relative; height: 120px; overflow: hidden;
  }

  .featured-card {
    position: absolute; top: 10px; left: 18px; right: 18px;
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(90deg, #141820, #0d0f14);
    border: 1px solid var(--card-border);
    border-left: 4px solid var(--red);
    border-radius: 10px; padding: 11px 14px;
    opacity: 0; transform: translateX(50px);
    transition: opacity 0.45s ease, transform 0.45s ease;
    pointer-events: none;
    cursor: pointer;
  }
  .featured-card.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
  .featured-card.exit    { opacity: 0; transform: translateX(-50px); }

  .fc-photo {
    width: 64px; height: 64px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--red);
    flex-shrink: 0; box-shadow: 0 0 14px rgba(232,0,28,0.3);
  }
  .fc-info { flex: 1; min-width: 0; }
  .fc-name {
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.5px;
    color: #fff; line-height: 1.15;
    white-space: normal; word-break: break-word;
    overflow: visible;
  }
  .fc-party { font-size: 11px; color: var(--gold); font-weight: 600; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fc-district { font-size: 10px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .fc-votes { text-align: right; flex-shrink: 0; }
  .fc-vote-num { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--gold); line-height: 1; }
  .fc-vote-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  .slide-dots { display: flex; justify-content: center; gap: 6px; padding: 4px 0 8px; }
  .slide-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--card-border); transition: background 0.3s, transform 0.3s; cursor: pointer; }
  .slide-dot.active { background: var(--red); transform: scale(1.4); }

  /* Main Results */
  .results-scroll {
    flex: 1; overflow-y: auto; padding: 14px 18px 18px; scroll-behavior: smooth;
  }
  .results-scroll::-webkit-scrollbar { width: 5px; }
  .results-scroll::-webkit-scrollbar-track { background: #111; }
  .results-scroll::-webkit-scrollbar-thumb { background: var(--red); border-radius: 3px; }

  /* ── CONSTITUENCY HEADER ── */
  .section-header {
    display: flex; align-items: center; gap: 0;
    padding: 5px 0 8px; margin-bottom: 8px;
    border-bottom: 1px solid var(--card-border);
    flex-wrap: nowrap; overflow: hidden;
  }
  .section-state-tag {
    background: var(--red);
    font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 1.5px;
    padding: 3px 8px; border-radius: 3px 0 0 3px; color: #fff; white-space: nowrap; flex-shrink: 0;
  }
  .section-fullname {
    background: rgba(232,0,28,0.12);
    font-family: 'Noto Sans Devanagari', 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 600;
    color: #fff; padding: 3px 10px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1;
    border-radius: 0 3px 3px 0;
    border: 1px solid rgba(232,0,28,0.2);
    border-left: none;
  }
  .section-const-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; color: var(--gold);
    letter-spacing: 1px; margin-left: 10px; flex-shrink: 0; white-space: nowrap;
  }

  .cards-row { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }

  .ccard {
    display: flex; align-items: center; gap: 12px;
    background: var(--card-bg);
    border: 1px solid var(--card-border); border-left: 4px solid transparent;
    border-radius: 8px; padding: 9px 12px;
    position: relative; overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.15s;
  }
  .ccard:hover { border-color: var(--gold); background: #161a22; transform: translateX(3px); }
  .ccard::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(255,255,255,0.018) 0%, transparent 60%);
    pointer-events: none;
  }
  .ccard.winner {
    border-left-color: var(--green);
    background: linear-gradient(90deg, rgba(0,230,118,0.06), var(--card-bg) 50%);
  }
  .ccard.winner:hover { border-color: var(--green); background: linear-gradient(90deg, rgba(0,230,118,0.1), #161a22 50%); }

  .rank { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--card-border); width: 26px; text-align: center; flex-shrink: 0; line-height: 1; }
  .ccard.winner .rank { color: var(--green); text-shadow: 0 0 10px rgba(0,230,118,0.6); }

  .photo { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid var(--card-border); flex-shrink: 0; background: #1a1a2e; }
  .ccard.winner .photo { border-color: var(--green); box-shadow: 0 0 10px rgba(0,230,118,0.3); }

  .info { flex: 1; min-width: 0; }
  .cname { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cmeta { display: flex; gap: 8px; align-items: center; margin-top: 3px; flex-wrap: wrap; }
  .party-tag { font-size: 11px; font-weight: 600; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .age-tag { font-size: 11px; color: var(--muted); flex-shrink: 0; }

  .vote-block { text-align: right; flex-shrink: 0; min-width: 76px; }
  .vote-num { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #fff; line-height: 1; }
  .ccard.winner .vote-num { color: var(--green); text-shadow: 0 0 8px rgba(0,230,118,0.5); }
  .vote-label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }

  .win-badge { position: absolute; top: 7px; right: 7px; background: var(--green); color: #000; font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 2px; padding: 2px 7px; border-radius: 3px; }

  .vote-bar-wrap { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.04); }
  .vote-bar { height: 100%; background: linear-gradient(90deg, var(--blue), var(--red)); transition: width 0.8s; }
  .ccard.winner .vote-bar { background: linear-gradient(90deg, #00c853, var(--green)); }

  /* ════════ BOTTOM VOTE TICKER ════════ */
  .ticker {
    background: #0a0c10;
    border-top: 2px solid var(--card-border);
    height: 52px;
    display: flex; align-items: center;
    overflow: hidden; flex-shrink: 0;
    position: relative;
  }
  .ticker-label {
    background: var(--red);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 3px;
    padding: 0 16px; height: 100%;
    display: flex; align-items: center; flex-shrink: 0;
    border-right: 3px solid var(--dark-red);
    white-space: nowrap; z-index: 2;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
  .ticker-overflow { flex: 1; overflow: hidden; height: 100%; position: relative; }
  .ticker-track {
    display: flex; align-items: center;
    height: 100%;
    white-space: nowrap;
    /* JS-driven scroll, no CSS animation */
  }
  .ticker-card {
    display: inline-flex; align-items: center; gap: 10px;
    background: #111620;
    border: 1px solid var(--card-border);
    border-left: 3px solid var(--red);
    border-radius: 6px;
    padding: 6px 14px 6px 10px;
    margin: 0 10px;
    flex-shrink: 0;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .ticker-card:hover { border-color: var(--gold); background: #161b26; }
  .ticker-card.tc-winner { border-left-color: var(--green); background: rgba(0,230,118,0.06); }
  .ticker-card.tc-winner:hover { background: rgba(0,230,118,0.1); }

  .tc-photo {
    width: 32px; height: 32px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--card-border);
    flex-shrink: 0;
  }
  .ticker-card.tc-winner .tc-photo { border-color: var(--green); }

  .tc-info { display: flex; flex-direction: column; justify-content: center; }
  .tc-name {
    font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 0.5px;
    color: #fff; line-height: 1; white-space: nowrap;
  }
  .ticker-card.tc-winner .tc-name { color: var(--green); }
  .tc-party { font-size: 10px; color: var(--muted); margin-top: 1px; white-space: nowrap; letter-spacing: 0.3px; }

  .tc-divider { width: 1px; height: 28px; background: var(--card-border); flex-shrink: 0; }

  .tc-votes-wrap { text-align: right; flex-shrink: 0; }
  .tc-votes {
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; line-height: 1;
    color: var(--gold);
  }
  .ticker-card.tc-winner .tc-votes { color: var(--green); text-shadow: 0 0 8px rgba(0,230,118,0.4); }
  .tc-votes-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  /* ════════ PROFILE MODAL ════════ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.78);
    display: none; align-items: center; justify-content: center;
    z-index: 9999; padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .modal-box {
    background: #0f1219;
    border: 1px solid var(--card-border);
    border-top: 3px solid var(--red);
    border-radius: 16px;
    max-width: 660px; width: 100%;
    max-height: 88vh; overflow-y: auto;
    animation: slideUp 0.3s ease;
    position: relative;
  }
  .modal-box::-webkit-scrollbar { width: 4px; }
  .modal-box::-webkit-scrollbar-thumb { background: var(--red); border-radius: 3px; }
  @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

  .modal-close {
    position: absolute; top: 14px; right: 16px;
    background: rgba(255,255,255,0.08); border: none;
    color: var(--muted); font-size: 18px; width: 32px; height: 32px;
    border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s; z-index: 10;
  }
  .modal-close:hover { background: var(--red); color: #fff; }

  .modal-hero {
    display: flex; gap: 20px; align-items: flex-start;
    padding: 24px 24px 20px;
    background: linear-gradient(135deg, #141820 0%, #0f1219 100%);
    border-bottom: 1px solid var(--card-border);
    border-radius: 14px 14px 0 0;
    position: relative; overflow: hidden;
  }
  .modal-hero::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,0.008) 20px, rgba(255,255,255,0.008) 21px);
    pointer-events: none;
  }

  .modal-photo {
    width: 100px; height: 100px; border-radius: 50%;
    object-fit: cover; border: 3px solid var(--red);
    flex-shrink: 0;
    box-shadow: 0 0 24px rgba(232,0,28,0.35);
    position: relative; z-index: 1;
  }
  .modal-photo-winner { border-color: var(--green); box-shadow: 0 0 24px rgba(0,230,118,0.4); }

  .modal-hero-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
  .modal-name {
    font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px;
    color: #fff; line-height: 1; margin-bottom: 6px;
  }
  .modal-party { font-size: 14px; font-weight: 600; color: var(--gold); margin-bottom: 4px; }
  .modal-symbol { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .modal-constituency {
    font-family: 'Noto Sans Devanagari', 'Rajdhani', sans-serif;
    font-size: 13px; color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.06);
    display: inline-block; padding: 4px 10px; border-radius: 4px;
    border-left: 3px solid var(--red);
  }

  .modal-vote-hero {
    text-align: right; flex-shrink: 0; position: relative; z-index: 1;
  }
  .modal-vote-big {
    font-family: 'Bebas Neue', sans-serif; font-size: 52px; line-height: 1;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(245,194,0,0.4);
  }
  .modal-vote-big.green { color: var(--green); text-shadow: 0 0 30px rgba(0,230,118,0.4); }
  .modal-vote-lbl { font-size: 11px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
  .modal-winner-chip {
    display: inline-block; margin-top: 6px;
    background: var(--green); color: #000;
    font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2px;
    padding: 3px 10px; border-radius: 4px;
  }

  /* Details Grid */
  .modal-details { padding: 20px 24px; }
  .modal-details-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 3px;
    color: var(--muted); margin-bottom: 14px; text-transform: uppercase;
  }
  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .detail-item {
    background: #141820;
    border: 1px solid var(--card-border);
    border-left: 3px solid var(--red);
    border-radius: 6px; padding: 10px 12px;
  }
  .detail-item.full { grid-column: 1 / -1; }
  .detail-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
  .detail-value {
    font-family: 'Noto Sans Devanagari', 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 600; color: #fff; line-height: 1.3;
  }
  .detail-value.gold { color: var(--gold); font-family: 'Bebas Neue', sans-serif; font-size: 20px; }
  .detail-value.green { color: var(--green); font-family: 'Bebas Neue', sans-serif; font-size: 20px; }

  /* Vote bar in modal */
  .modal-vote-bar-section { padding: 0 24px 20px; }
  .modal-bar-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
  .modal-bar-wrap { background: rgba(255,255,255,0.05); border-radius: 4px; height: 8px; overflow: hidden; }
  .modal-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--blue), var(--red)); transition: width 1s ease; }
  .modal-bar-fill.green { background: linear-gradient(90deg, #00c853, var(--green)); }
  .modal-bar-pct { font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: var(--muted); margin-top: 5px; text-align: right; }

  /* ════════ LOADING / NO RESULTS ════════ */
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; }
  .loader-ring { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.08); border-top-color: var(--red); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 4px; color: var(--muted); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
  .no-results { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 16px; font-weight: 600; }

  /* ════════ MOBILE RESPONSIVE ════════ */
  @media (max-width: 768px) {
    html, body { overflow: auto; }
    .screen { height: auto; min-height: 100vh; overflow: auto; }

    /* Top bar compact */
    .topbar { height: auto; padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
    .brand-title { font-size: 18px; }
    .flag-icon { font-size: 24px; }
    .live-badge { font-size: 13px; padding: 4px 10px; }
    .live-dot { width: 7px; height: 7px; }
    .topbar-stats { gap: 12px; }
    .tstat-num { font-size: 16px; }
    .tstat-label { font-size: 9px; letter-spacing: 1px; }

    /* Search */
    .searchbar { padding: 8px 14px; }
    .search-input { font-size: 14px; }
    .search-count { display: none; }

    /* Stack panels vertically on mobile */
    .body-split { flex-direction: column; overflow: visible; height: auto; }

    /* Left panel full width, fixed height with scroll */
    .left-panel {
      width: 100%; border-right: none;
      border-bottom: 2px solid var(--card-border);
      height: 260px; flex-shrink: 0;
    }

    /* Right panel full width */
    .right-panel { overflow: visible; }

    /* Featured slideshow */
    .featured-slide-wrap { height: 130px; }
    .featured-card { padding: 10px 12px; gap: 10px; }
    .fc-photo { width: 52px; height: 52px; }
    .fc-name { font-size: 16px; }
    .fc-party { font-size: 10px; }
    .fc-district { font-size: 9px; }
    .fc-vote-num { font-size: 24px; }

    /* Results scroll — no fixed height on mobile */
    .results-scroll { overflow-y: visible; height: auto; padding: 10px 12px; }

    /* Candidate cards */
    .ccard { padding: 8px 10px; gap: 10px; }
    .photo { width: 42px; height: 42px; }
    .rank { font-size: 20px; width: 22px; }
    .cname { font-size: 14px; }
    .party-tag { max-width: 140px; font-size: 10px; }
    .vote-num { font-size: 20px; }
    .vote-block { min-width: 62px; }
    .section-fullname { font-size: 11px; }
    .section-const-num { display: none; }

    /* Modal full screen on mobile */
    .modal-overlay { padding: 0; align-items: flex-end; }
    .modal-box { max-width: 100%; border-radius: 20px 20px 0 0; max-height: 92vh; }
    .modal-hero { padding: 18px 16px 14px; gap: 14px; }
    .modal-photo { width: 72px; height: 72px; }
    .modal-name { font-size: 24px; }
    .modal-vote-big { font-size: 38px; }
    .modal-details { padding: 16px; }
    .detail-grid { grid-template-columns: 1fr 1fr; gap: 8px; }

    /* Bottom ticker */
    .ticker { height: 60px; }
    .ticker-label { font-size: 10px; letter-spacing: 1px; padding: 0 10px; }
    .tc-photo { width: 28px; height: 28px; }
    .tc-name { font-size: 13px; }
    .tc-party { font-size: 9px; }
    .tc-votes { font-size: 16px; }
    .ticker-card { padding: 5px 10px 5px 8px; gap: 7px; margin: 0 6px; }
  }

  @media (max-width: 420px) {
    .brand-title { font-size: 15px; }
    .topbar-stats { gap: 8px; }
    .tstat-num { font-size: 14px; }
    .fc-name { font-size: 14px; }
    .modal-hero { flex-wrap: wrap; }
    .modal-vote-hero { width: 100%; text-align: left; margin-top: 8px; }
    .modal-vote-big { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="screen">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <span class="flag-icon">🇳🇵</span>
      <div class="brand-text">
        <span class="brand-title">नेपाल निर्वाचन २०८२</span>
      </div>
    </div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="topbar-stats">
      <div class="tstat"><div class="tstat-num" id="statCandidates">—</div><div class="tstat-label">Candidates</div></div>
      <div class="tstat"><div class="tstat-num" id="statConstit">—</div><div class="tstat-label">Seats</div></div>
      <div class="tstat"><div class="tstat-num" id="statVotes">—</div><div class="tstat-label">Total Votes</div></div>
    </div>
  </div>

  <!-- SEARCH BAR -->
  <div class="searchbar">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="Search candidate, party, district, state..." autocomplete="off">
    <div class="search-count">Showing <span id="countDisplay">0</span> candidates</div>
  </div>

  <!-- SPLIT BODY -->
  <div class="body-split">

    <!-- LEFT: Auto-scroll Name + Votes -->
    <div class="left-panel">
      <div class="panel-header">
        <div class="panel-header-bar"></div>
        <span class="panel-header-title">ALL CANDIDATES</span>
        <span class="panel-header-count" id="leftCount">—</span>
      </div>
      <div class="autoscroll-wrap" id="autoScrollWrap">
        <div class="autoscroll-track" id="autoScrollTrack">
          <div class="loading-screen">
            <div class="loader-ring"></div>
            <div class="loading-text">Loading...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-panel">

      <!-- Top Competition Slideshow -->
      <div class="top-comp-section">
        <div class="top-comp-header">
          <div class="top-comp-bar"></div>
          <span class="top-comp-title">⭐ TOP COMPETITION</span>
          <span class="top-comp-sub" id="slideCounter">1 / —</span>
        </div>
        <div class="featured-slide-wrap" id="featuredSlide"></div>
        <div class="slide-dots" id="slideDots"></div>
      </div>

      <!-- Full Results -->
      <div class="results-scroll" id="scrollArea">
        <div class="loading-screen" id="loadingScreen">
          <div class="loader-ring"></div>
          <div class="loading-text">Loading Live Results...</div>
        </div>
      </div>

    </div>
  </div>

  <!-- BOTTOM VOTE TICKER: Top Competition candidates -->
  <div class="ticker">
    <div class="ticker-label">⭐ TOP<br>VOTE COUNT</div>
    <div class="ticker-overflow" id="tickerOverflow">
      <div class="ticker-track" id="tickerTrack"></div>
    </div>
  </div>

</div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal-box" id="modalBox">
  </div>
</div>

<script>
const API = "https://yosintv.github.io/xauusd/2082.json";
const FEATURED_IDS = [339653, 341549, 340990, 340111];

let allData = [];
let filtered = [];
let autoScrollRAF = null;
let autoScrollPos = 0;
let slideIndex = 0;
let slideTimer = null;
let featuredList = [];
let winnerIDs = new Set();
let groupsCache = {};
let lastTime = null;

// ─── FETCH ───
fetch(API)
  .then(r => r.json())
  .then(json => {
    allData = json;
    filtered = json;
    groupsCache = groupBy(json);
    computeWinners(json);
    updateStats(json);
    buildLeftPanel(json);
    buildFeatured(json);
    buildTicker(json);
    renderResults(json);
    document.getElementById('loadingScreen').style.display = 'none';
  })
  .catch(() => {
    document.getElementById('loadingScreen').innerHTML = '<p style="color:var(--red);padding:20px">⚠️ Failed to load data</p>';
  });

// ─── STATS ───
function updateStats(data) {
  const seats = new Set(data.map(c => `${c.STATE_ID}|${c.DistrictName}|${c.SCConstID}`));
  const votes = data.reduce((s, c) => s + (c.TotalVoteReceived||0), 0);
  document.getElementById('statCandidates').textContent = data.length.toLocaleString();
  document.getElementById('statConstit').textContent = seats.size.toLocaleString();
  const voteText = votes >= 1e6 ? (votes/1e6).toFixed(1)+'M' :
    votes >= 1000 ? (votes/1000).toFixed(0)+'K' :
    votes > 0 ? votes.toString() : 'N/A';
  document.getElementById('statVotes').textContent = voteText;
}

// ─── GROUP ───
function groupBy(data) {
  const g = {};
  data.forEach(c => {
    const k = `${c.STATE_ID}|${c.DistrictName}|${c.SCConstID}`;
    if (!g[k]) g[k] = [];
    g[k].push(c);
  });
  return g;
}

// ─── WINNERS ───
function computeWinners(data) {
  winnerIDs = new Set();
  const groups = groupBy(data);
  Object.values(groups).forEach(list => {
    const max = Math.max(...list.map(c => c.TotalVoteReceived||0));
    if (max > 0) {
      const w = list.filter(c => c.TotalVoteReceived === max);
      if (w.length === 1) winnerIDs.add(w[0].CandidateID);
    }
  });
}

// ─── CONSTITUENCY LABEL ───
// Format: StateName · DistrictName - ConstID  e.g. कोशी प्रदेश · ताप्लेजुङ - 1
function constLabel(c) {
  return `${c.StateName} · ${c.DistrictName} - ${c.SCConstID}`;
}

// ─── LEFT PANEL ───
function buildLeftPanel(data) {
  // Show ALL candidates sorted by votes descending
  const sorted = [...data].sort((a,b) => (b.TotalVoteReceived||0) - (a.TotalVoteReceived||0));
  const groups = groupBy(data);
  document.getElementById('leftCount').textContent = sorted.length + ' candidates';

  const track = document.getElementById('autoScrollTrack');
  track.innerHTML = sorted.map((c, i) => {
    const votes = c.TotalVoteReceived || 0;
    const isWin = winnerIDs.has(c.CandidateID);
    const grpKey = `${c.STATE_ID}|${c.DistrictName}|${c.SCConstID}`;
    const grp = groups[grpKey] || [];
    const mx = Math.max(...grp.map(x => x.TotalVoteReceived||0));
    const pct = mx > 0 ? (votes/mx*100) : 0;
    const dataStr = encodeURIComponent(JSON.stringify(c));
    return `<div class="nv-row ${isWin?'is-winner':''}" onclick="openProfile('${dataStr}')">
      <div class="nv-bg-bar" style="width:${pct}%"></div>
      <div class="nv-rank">${i+1}</div>
      <div class="nv-text">
        <div class="nv-name">${c.CandidateName}${isWin?'<span class="nv-crown">👑</span>':''}</div>
        <div class="nv-sub">${c.PoliticalPartyName} · ${c.DistrictName}</div>
      </div>
      <div class="nv-votes">${votes > 0 ? votes.toLocaleString() : '—'}</div>
    </div>`;
  }).join('');

  // Reset and restart scroll
  if (autoScrollRAF) cancelAnimationFrame(autoScrollRAF);
  autoScrollPos = 0;
  lastTime = null;
  track.style.transition = '';
  track.style.transform = 'translateY(0)';
  autoScrollRAF = requestAnimationFrame(autoScrollStep);
}

function autoScrollStep(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  const wrap = document.getElementById('autoScrollWrap');
  const track = document.getElementById('autoScrollTrack');
  if (!wrap || !track) return;

  const maxScroll = track.scrollHeight - wrap.clientHeight + 50;
  if (maxScroll <= 0) return;

  autoScrollPos += dt * 0.0015; // ~1.5px/sec — ultra slow, very readable on YouTube stream

  if (autoScrollPos >= maxScroll) {
    track.style.transition = 'none';
    track.style.transform = `translateY(-${maxScroll}px)`;
    setTimeout(() => {
      track.style.transition = 'transform 2.5s ease-in-out';
      track.style.transform = 'translateY(0)';
      autoScrollPos = 0;
      lastTime = null;
      setTimeout(() => {
        track.style.transition = '';
        autoScrollRAF = requestAnimationFrame(autoScrollStep);
      }, 2600);
    }, 5000);
    return;
  }

  track.style.transform = `translateY(-${autoScrollPos}px)`;
  autoScrollRAF = requestAnimationFrame(autoScrollStep);
}

// ─── FEATURED SLIDESHOW ───
function buildFeatured(data) {
  let feat = data.filter(c => FEATURED_IDS.includes(c.CandidateID));
  if (feat.length < 2) {
    feat = [...data].sort((a,b) => (b.TotalVoteReceived||0)-(a.TotalVoteReceived||0)).slice(0, 6);
  }
  featuredList = feat;

  const wrap = document.getElementById('featuredSlide');
  const dots = document.getElementById('slideDots');

  wrap.innerHTML = featuredList.map((c, i) => {
    const votes = c.TotalVoteReceived || 0;
    const photo = `https://result.election.gov.np/Images/Candidate/${c.CandidateID}.jpg`;
    const dataStr = encodeURIComponent(JSON.stringify(c));
    return `<div class="featured-card" id="fc-${i}" onclick="openProfile('${dataStr}')">
      <img class="fc-photo" src="${photo}" onerror="this.src='https://via.placeholder.com/60/1e2530/8a9ab5?text=?'" loading="lazy">
      <div class="fc-info">
        <div class="fc-name">${c.CandidateName}</div>
        <div class="fc-party">${c.PoliticalPartyName}</div>
        <div class="fc-district">${constLabel(c)}</div>
      </div>
      <div class="fc-votes">
        <div class="fc-vote-num">${votes > 0 ? votes.toLocaleString() : '—'}</div>
        <div class="fc-vote-label">Votes</div>
      </div>
    </div>`;
  }).join('');

  dots.innerHTML = featuredList.map((_, i) =>
    `<div class="slide-dot ${i===0?'active':''}" id="dot-${i}" onclick="showSlide(${i})"></div>`
  ).join('');

  slideIndex = 0;
  showSlide(0);
  document.getElementById('slideCounter').textContent = `1 / ${featuredList.length}`;

  if (slideTimer) clearInterval(slideTimer);
  slideTimer = setInterval(() => {
    showSlide((slideIndex + 1) % featuredList.length);
  }, 4000);
}

function showSlide(idx) {
  const prev = slideIndex;
  featuredList.forEach((_, i) => {
    const el = document.getElementById(`fc-${i}`);
    if (!el) return;
    el.classList.remove('visible', 'exit');
    if (i === idx) {
      void el.offsetWidth;
      el.classList.add('visible');
    } else if (i === prev && prev !== idx) {
      el.classList.add('exit');
    }
  });
  document.querySelectorAll('.slide-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  slideIndex = idx;
  document.getElementById('slideCounter').textContent = `${idx+1} / ${featuredList.length}`;
}

// ─── BOTTOM TICKER: Top Competition slow scroll ───
let tickerRAF = null;
let tickerPos = 0;
let tickerLastTime = null;

function buildTicker(data) {
  // Only top competition candidates
  let feat = data.filter(c => FEATURED_IDS.includes(c.CandidateID));
  if (feat.length < 2) {
    feat = [...data].sort((a,b) => (b.TotalVoteReceived||0)-(a.TotalVoteReceived||0)).slice(0, 10);
  } else {
    feat.sort((a,b) => (b.TotalVoteReceived||0)-(a.TotalVoteReceived||0));
  }

  const track = document.getElementById('tickerTrack');
  const makeCards = () => feat.map(c => {
    const votes = c.TotalVoteReceived || 0;
    const isWin = winnerIDs.has(c.CandidateID);
    const photo = `https://result.election.gov.np/Images/Candidate/${c.CandidateID}.jpg`;
    const dataStr = encodeURIComponent(JSON.stringify(c));
    return `<div class="ticker-card ${isWin?'tc-winner':''}" onclick="openProfile('${dataStr}')">
      <img class="tc-photo" src="${photo}" onerror="this.src='https://via.placeholder.com/32/1e2530/8a9ab5?text=?'" loading="lazy">
      <div class="tc-info">
        <div class="tc-name">${isWin?'👑 ':''}${c.CandidateName}</div>
        <div class="tc-party">${c.PoliticalPartyName} · ${c.DistrictName}</div>
      </div>
      <div class="tc-divider"></div>
      <div class="tc-votes-wrap">
        <div class="tc-votes">${votes > 0 ? votes.toLocaleString() : '—'}</div>
        <div class="tc-votes-label">${votes > 0 ? 'VOTES' : 'PENDING'}</div>
      </div>
    </div>`;
  }).join('');

  // Double the cards for seamless infinite loop
  track.innerHTML = makeCards() + makeCards();

  // Start slow scroll
  if (tickerRAF) cancelAnimationFrame(tickerRAF);
  tickerPos = 0;
  tickerLastTime = null;
  track.style.transform = 'translateX(0)';
  tickerRAF = requestAnimationFrame(tickerStep);
}

function tickerStep(ts) {
  if (!tickerLastTime) tickerLastTime = ts;
  const dt = Math.min(ts - tickerLastTime, 50);
  tickerLastTime = ts;

  const track = document.getElementById('tickerTrack');
  const overflow = document.getElementById('tickerOverflow');
  if (!track || !overflow) return;

  // Half-width = one set of cards
  const halfWidth = track.scrollWidth / 2;
  if (halfWidth <= 0) { tickerRAF = requestAnimationFrame(tickerStep); return; }

  tickerPos += dt * 0.018; // ~18px/sec — slow and very readable

  if (tickerPos >= halfWidth) {
    tickerPos = 0; // seamless loop back
  }

  track.style.transform = `translateX(-${tickerPos}px)`;
  tickerRAF = requestAnimationFrame(tickerStep);
}

// ─── RENDER MAIN RESULTS ───
function renderResults(data) {
  const area = document.getElementById('scrollArea');
  document.getElementById('countDisplay').textContent = data.length.toLocaleString();

  if (!data.length) {
    area.innerHTML = '<div class="no-results">🔍 No candidates found</div>';
    return;
  }

  const groups = groupBy(data);
  let html = '';
  Object.values(groups).forEach(list => {
    list.sort((a,b) => (b.TotalVoteReceived||0)-(a.TotalVoteReceived||0));
    const max = list[0].TotalVoteReceived || 0;
    const singleW = max > 0 && list.filter(c => c.TotalVoteReceived===max).length === 1;

    // Constituency header
    const rep = list[0];
    html += `<div>
      <div class="section-header">
        <span class="section-state-tag">${rep.StateName}</span>
        <span class="section-fullname">${rep.DistrictName} — निर्वाचन क्षेत्र ${rep.SCConstID}</span>
        <span class="section-const-num">Constituency #${rep.SCConstID}</span>
      </div>
      <div class="cards-row">
        ${list.map((c,i) => candidateCard(c, i+1, singleW && c.TotalVoteReceived===max, max)).join('')}
      </div>
    </div>`;
  });
  area.innerHTML = html;
}

function candidateCard(c, rank, isWinner, maxVotes) {
  const votes = c.TotalVoteReceived || 0;
  const pct = maxVotes > 0 ? (votes/maxVotes*100) : 0;
  const photo = `https://result.election.gov.np/Images/Candidate/${c.CandidateID}.jpg`;
  const dataStr = encodeURIComponent(JSON.stringify(c));
  return `<div class="ccard ${isWinner?'winner':''}" onclick="openProfile('${dataStr}')">
    ${isWinner ? '<div class="win-badge">👑 LEADING</div>' : ''}
    <div class="rank">${rank}</div>
    <img class="photo" src="${photo}" onerror="this.src='https://via.placeholder.com/48/1e2530/8a9ab5?text=?'" loading="lazy">
    <div class="info">
      <div class="cname">${c.CandidateName}</div>
      <div class="cmeta">
        <span class="party-tag">${c.PoliticalPartyName}</span>
        <span class="age-tag">Age ${c.AGE_YR||'—'}</span>
      </div>
    </div>
    <div class="vote-block">
      <div class="vote-num">${votes > 0 ? votes.toLocaleString() : '—'}</div>
      <div class="vote-label">${votes > 0 ? 'Votes' : 'No count yet'}</div>
    </div>
    <div class="vote-bar-wrap"><div class="vote-bar" style="width:${pct}%"></div></div>
  </div>`;
}

// ─── PROFILE MODAL ───
function openProfile(dataStr) {
  const c = JSON.parse(decodeURIComponent(dataStr));
  const votes = c.TotalVoteReceived || 0;
  const isWin = winnerIDs.has(c.CandidateID);
  const photo = `https://result.election.gov.np/Images/Candidate/${c.CandidateID}.jpg`;

  // find group for vote bar %
  const grpKey = `${c.STATE_ID}|${c.DistrictName}|${c.SCConstID}`;
  const grp = groupsCache[grpKey] || [];
  const maxInGroup = Math.max(...grp.map(x => x.TotalVoteReceived||0));
  const pct = maxInGroup > 0 && votes > 0 ? (votes/maxInGroup*100).toFixed(1) : 0;

  // Opponents in same constituency
  const opponents = [...grp].sort((a,b) => (b.TotalVoteReceived||0)-(a.TotalVoteReceived||0)).filter(x => x.CandidateID !== c.CandidateID);
  const opponentHTML = opponents.map(op => {
    const opVotes = op.TotalVoteReceived || 0;
    const opPct = maxInGroup > 0 && opVotes > 0 ? (opVotes/maxInGroup*100).toFixed(1) : 0;
    const opPhoto = `https://result.election.gov.np/Images/Candidate/${op.CandidateID}.jpg`;
    return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
      <img src="${opPhoto}" onerror="this.src='https://via.placeholder.com/32/1e2530/8a9ab5?text=?'" style="width:32px;height:32px;border-radius:50%;border:1px solid var(--card-border);flex-shrink:0">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${op.CandidateName}</div>
        <div style="font-size:10px;color:var(--muted)">${op.PoliticalPartyName}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff">${opVotes > 0 ? opVotes.toLocaleString() : '—'}</div>
        <div style="font-size:10px;color:var(--muted)">${opPct > 0 ? opPct+'%' : ''}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('modalBox').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>

    <!-- HERO -->
    <div class="modal-hero">
      <img class="modal-photo ${isWin?'modal-photo-winner':''}" src="${photo}" onerror="this.src='https://via.placeholder.com/100/1e2530/8a9ab5?text=?'">
      <div class="modal-hero-info">
        <div class="modal-name">${c.CandidateName}</div>
        <div class="modal-party">${c.PoliticalPartyName}</div>
        ${c.SymbolName ? `<div class="modal-symbol">🔖 ${c.SymbolName}</div>` : ''}
        <div class="modal-constituency">${constLabel(c)}</div>
      </div>
      <div class="modal-vote-hero">
        <div class="modal-vote-big ${isWin?'green':''}">${votes > 0 ? votes.toLocaleString() : '—'}</div>
        <div class="modal-vote-lbl">${votes > 0 ? 'Total Votes' : 'मत गणना बाँकी'}</div>
        ${isWin ? '<div class="modal-winner-chip">👑 LEADING</div>' : ''}
      </div>
    </div>

    <!-- VOTE BAR -->
    ${maxInGroup > 0 ? `
    <div class="modal-vote-bar-section">
      <div class="modal-bar-label">Vote share in constituency</div>
      <div class="modal-bar-wrap">
        <div class="modal-bar-fill ${isWin?'green':''}" style="width:${pct}%"></div>
      </div>
      <div class="modal-bar-pct">${pct}% of top vote in constituency</div>
    </div>` : ''}

    <!-- DETAILS -->
    <div class="modal-details">
      <div class="modal-details-title">Candidate Information</div>
      <div class="detail-grid">
        <div class="detail-item">
          <div class="detail-label">Full Name</div>
          <div class="detail-value">${c.CandidateName}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Age</div>
          <div class="detail-value">${c.AGE_YR || '—'}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Gender</div>
          <div class="detail-value">${c.Gender || '—'}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Qualification</div>
          <div class="detail-value">${c.QUALIFICATION || '—'}</div>
        </div>
        <div class="detail-item full">
          <div class="detail-label">Political Party</div>
          <div class="detail-value">${c.PoliticalPartyName}</div>
        </div>
        <div class="detail-item full">
          <div class="detail-label">Constituency</div>
          <div class="detail-value">${constLabel(c)}</div>
        </div>
        ${c.ADDRESS ? `<div class="detail-item full">
          <div class="detail-label">Address</div>
          <div class="detail-value">${c.ADDRESS}</div>
        </div>` : ''}
        ${c.FATHER_NAME ? `<div class="detail-item">
          <div class="detail-label">Father's Name</div>
          <div class="detail-value">${c.FATHER_NAME}</div>
        </div>` : ''}
        ${c.SPOUCE_NAME ? `<div class="detail-item">
          <div class="detail-label">Spouse's Name</div>
          <div class="detail-value">${c.SPOUCE_NAME}</div>
        </div>` : ''}
        <div class="detail-item">
          <div class="detail-label">Total Votes</div>
          <div class="detail-value ${isWin?'green':'gold'}">${votes > 0 ? votes.toLocaleString() : '—'}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">Status</div>
          <div class="detail-value ${isWin?'green':''}">${isWin ? '👑 Leading' : votes > 0 ? 'Trailing' : 'मत गणना बाँकी'}</div>
        </div>
      </div>

      ${opponents.length > 0 ? `
      <div style="margin-top:20px">
        <div class="modal-details-title">Opponents in Constituency</div>
        ${opponentHTML}
      </div>` : ''}
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ─── SEARCH ───
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  filtered = !q ? allData : allData.filter(c =>
    `${c.CandidateName} ${c.StateName} ${c.DistrictName} ${c.PoliticalPartyName} ${c.SCConstID}`.toLowerCase().includes(q)
  );
  computeWinners(filtered);
  groupsCache = groupBy(filtered);
  renderResults(filtered);
  buildLeftPanel(filtered);
});
</script>
</body>
</html>
